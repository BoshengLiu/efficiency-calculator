<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>错误率降低计算器 - 量化精确性提升价值 | 自动化价值展示中心</title>
  <meta name="description" content="输入月处理量、当前错误率和修复成本，计算Python自动化将错误率降低90%后每年能为您节省多少成本。">
  <meta name="keywords" content="错误率降低,精确性提升,自动化质量,错误成本计算">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" as="script">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/animations.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body class="page-entering">

<nav class="tool-nav" aria-label="工具页导航">
  <div class="container tool-nav__inner">
    <a href="#" class="tool-nav__back" id="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      返回主页
    </a>
    <span class="tool-nav__title">🛡️ 错误率降低计算器</span>
    <button class="btn btn--sm btn--outline" onclick="window.print()">打印报告</button>
  </div>
</nav>

<div class="tool-hero">
  <div class="container">
    <div class="tool-hero__content reveal">
      <div class="tool-hero__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11 4.5-.85 8-5.75 8-11V6L12 2z"/><path d="M9 12l2 2 4-4"/>
        </svg>
      </div>
      <div>
        <h1 class="tool-hero__title">错误率降低计算器</h1>
        <p class="tool-hero__desc">量化自动化在提升精确性上的优势，将人工错误率降至接近零。</p>
      </div>
    </div>
  </div>
</div>

<main>
  <div class="container">
    <div class="tool-layout reveal" id="error-calculator-container"></div>
  </div>

  <div class="section section--alt" style="padding:var(--space-12) 0;">
    <div class="container">
      <div style="max-width:760px;margin:0 auto;" class="reveal">
        <h2 style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-4);">计算说明</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
          <div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-4);border:1px solid var(--color-border-light);">
            <div style="font-weight:700;color:var(--color-primary);margin-bottom:var(--space-2);">📐 计算公式</div>
            <div style="font-size:var(--text-sm);color:var(--color-text-secondary);line-height:1.8;">
              年节省 = 月量×12 × 错误率% × 总成本/错 × 90%<br>
              <span style="font-size:0.8em;color:var(--color-text-muted);">90% = 自动化错误消除率</span>
            </div>
          </div>
          <div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-4);border:1px solid var(--color-border-light);">
            <div style="font-weight:700;color:var(--color-success);margin-bottom:var(--space-2);">🎯 常见错误类型</div>
            <div style="font-size:var(--text-sm);color:var(--color-text-secondary);line-height:1.8;">
              数据录入错误 / 格式不符<br>
              计算失误 / 遗漏字段
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div style="text-align:center;padding:var(--space-6) 0;">
      <a href="#" id="footer-home-link" style="color:rgba(255,255,255,.7);font-size:var(--text-sm);">← 返回自动化价值展示中心</a>
      <p style="margin-top:var(--space-3);font-size:var(--text-xs);color:rgba(255,255,255,.4);">© 2024 自动化价值展示中心. All rights reserved.</p>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../../js/utils/debounce.js"></script>
<script src="../../js/utils/validators.js"></script>
<script src="../../js/utils/formatters.js"></script>
<script src="../../js/utils/analytics.js"></script>
<script src="../../js/components/page-transition.js"></script>
<script src="../../js/tools/error-calculator.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof Analytics !== 'undefined') Analytics.trackPageView();
    PageTransition.pageEnter();
    ErrorCalculator.init('error-calculator-container');
    document.getElementById('back-btn').addEventListener('click', function (e) { e.preventDefault(); PageTransition.goBack('../../index.html'); });
    document.getElementById('footer-home-link').addEventListener('click', function (e) { e.preventDefault(); PageTransition.goBack('../../index.html'); });
    var reveals = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window) {
      var obs = new IntersectionObserver(function (entries) { entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('reveal--visible'); obs.unobserve(e.target); } }); }, { threshold: 0.1 });
      reveals.forEach(function (el) { obs.observe(el); });
    } else { reveals.forEach(function (el) { el.classList.add('reveal--visible'); }); }
  });
</script>
</body>
</html>
