<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自动化可行性评估器 - 5分钟快速诊断 | 自动化价值展示中心</title>
  <meta name="description" content="回答5个关于您业务场景的问题，快速判断您的需求是否适合自动化改造，获取专属建议和优先行动方案。">
  <meta name="keywords" content="自动化可行性评估,自动化诊断,流程改造评估,数字化转型">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" as="script">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/animations.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body class="page-entering">

<nav class="tool-nav" aria-label="工具页导航">
  <div class="container tool-nav__inner">
    <a href="#" class="tool-nav__back" id="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      返回主页
    </a>
    <span class="tool-nav__title">📋 可行性评估器</span>
    <button class="btn btn--sm btn--outline" onclick="window.print()">打印报告</button>
  </div>
</nav>

<div class="tool-hero">
  <div class="container">
    <div class="tool-hero__content reveal">
      <div class="tool-hero__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 9h10M7 12h7M7 15h5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1 class="tool-hero__title">自动化可行性评估器</h1>
        <p class="tool-hero__desc">只需回答 5 个问题，立即获取您的场景自动化可行性评分和专属建议。</p>
      </div>
    </div>
  </div>
</div>

<main>
  <div class="container">
    <div class="tool-layout reveal" id="feasibility-container"></div>
  </div>

  <div class="section section--alt" style="padding:var(--space-12) 0;">
    <div class="container">
      <div style="max-width:760px;margin:0 auto;" class="reveal">
        <h2 style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-4);">评分说明</h2>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);">
          <div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-4);border-top:4px solid #dc3545;text-align:center;">
            <div style="font-size:1.5rem;margin-bottom:8px;">🔍</div>
            <div style="font-weight:700;font-size:0.85rem;">0~39分</div>
            <div style="font-size:0.75rem;color:var(--color-text-muted);margin-top:4px;">较低可行性<br>先夯实基础</div>
          </div>
          <div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-4);border-top:4px solid #ffc107;text-align:center;">
            <div style="font-size:1.5rem;margin-bottom:8px;">⚡</div>
            <div style="font-weight:700;font-size:0.85rem;">40~59分</div>
            <div style="font-size:0.75rem;color:var(--color-text-muted);margin-top:4px;">中等可行性<br>逐步推进</div>
          </div>
          <div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-4);border-top:4px solid #17a2b8;text-align:center;">
            <div style="font-size:1.5rem;margin-bottom:8px;">🚀</div>
            <div style="font-weight:700;font-size:0.85rem;">60~79分</div>
            <div style="font-size:0.75rem;color:var(--color-text-muted);margin-top:4px;">较高可行性<br>尽快启动</div>
          </div>
          <div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-4);border-top:4px solid #28a745;text-align:center;">
            <div style="font-size:1.5rem;margin-bottom:8px;">✅</div>
            <div style="font-weight:700;font-size:0.85rem;">80~100分</div>
            <div style="font-size:0.75rem;color:var(--color-text-muted);margin-top:4px;">强烈推荐<br>立即行动</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div style="text-align:center;padding:var(--space-6) 0;">
      <a href="#" id="footer-home-link" style="color:rgba(255,255,255,.7);font-size:var(--text-sm);">← 返回自动化价值展示中心</a>
      <p style="margin-top:var(--space-3);font-size:var(--text-xs);color:rgba(255,255,255,.4);">© 2024 自动化价值展示中心. All rights reserved.</p>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../../js/utils/debounce.js"></script>
<script src="../../js/utils/validators.js"></script>
<script src="../../js/utils/formatters.js"></script>
<script src="../../js/utils/analytics.js"></script>
<script src="../../js/components/page-transition.js"></script>
<script src="../../js/tools/feasibility-assessor.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof Analytics !== 'undefined') Analytics.trackPageView();
    PageTransition.pageEnter();
    FeasibilityAssessor.init('feasibility-container');
    document.getElementById('back-btn').addEventListener('click', function (e) { e.preventDefault(); PageTransition.goBack('../../index.html'); });
    document.getElementById('footer-home-link').addEventListener('click', function (e) { e.preventDefault(); PageTransition.goBack('../../index.html'); });
    var reveals = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window) {
      var obs = new IntersectionObserver(function (entries) { entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('reveal--visible'); obs.unobserve(e.target); } }); }, { threshold: 0.1 });
      reveals.forEach(function (el) { obs.observe(el); });
    } else { reveals.forEach(function (el) { el.classList.add('reveal--visible'); }); }
  });
</script>
</body>
</html>
