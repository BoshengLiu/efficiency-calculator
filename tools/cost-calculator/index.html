<!-- 跳转过渡遮罩（由 page-transition.js 动态创建） -->

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../../js/utils/debounce.js"></script>
<script src="../../js/utils/validators.js"></script>
<script src="../../js/utils/formatters.js"></script>
<script src="../../js/utils/analytics.js"></script>
<script src="../../js/components/page-transition.js"></script>
<script src="../../js/tools/cost-calculator.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof Analytics !== 'undefined') Analytics.trackPageView();
    PageTransition.pageEnter();

    /* 初始化计算器 */
    CostCalculator.init('cost-calculator-container');

    /* 返回按钮 */
    document.getElementById('back-btn').addEventListener('click', function (e) {
      e.preventDefault();
      PageTransition.goBack('../../index.html');
    });
    document.getElementById('footer-home-link').addEventListener('click', function (e) {
      e.preventDefault();
      PageTransition.goBack('../../index.html');
    });

    /* 滚动入场 */
    var reveals = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window) {
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('reveal--visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.1 });
      reveals.forEach(function (el) { obs.observe(el); });
    } else {
      reveals.forEach(function (el) { el.classList.add('reveal--visible'); });
    }
  });
</script>
</body>
